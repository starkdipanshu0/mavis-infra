<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="280" height="64" role="img" aria-label="Mavis Infra Solutions">

  <!-- Gold diamond mark -->
  <rect x="2" y="18" width="11" height="11" fill="#C8A96E" transform="rotate(45 7.5 23.5)"/>

  <!-- Thin vertical gold rule between mark and wordmark -->
  <line x1="26" y1="10" x2="26" y2="52" stroke="#C8A96E" stroke-width="0.75" opacity="0.6"/>

  <!-- MAVIS — bold weight -->
  <text
    x="38"
    y="36"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="30"
    fill="#F5F5F0"
    letter-spacing="7"
    dominant-baseline="middle">MAVIS</text>

  <!-- INFRA SOLUTIONS — ultra-thin, tracked -->
  <text
    x="39"
    y="54"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="300"
    font-size="8.5"
    fill="#F5F5F0"
    letter-spacing="5.5"
    opacity="0.72"
    dominant-baseline="middle">INFRA SOLUTIONS</text>

</svg>
